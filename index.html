<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>庫存管理系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --border: #2e3352;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --danger: #f7566a;
      --success: #3dd68c;
      --font: 'Segoe UI', system-ui, sans-serif;
      --radius: 12px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #1a1f3c 0%, var(--bg) 70%);
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
    }

    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .login-logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }

    .field input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 6px;
    }

    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }

    .error-msg {
      background: rgba(247,86,106,.12);
      border: 1px solid rgba(247,86,106,.35);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── APP ── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }

    header h2 { font-size: 16px; font-weight: 700; }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }

    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    main { padding: 28px; max-width: 1000px; margin: 0 auto; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px 11px 40px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      padding: 11px 20px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: opacity .2s;
      white-space: nowrap;
    }

    .btn-add:hover { opacity: .88; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 26px; font-weight: 700; }
    .stat-card .value.blue { color: var(--accent); }
    .stat-card .value.purple { color: var(--accent2); }
    .stat-card .value.green { color: var(--success); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--card);
      padding: 13px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    tbody td {
      padding: 14px 16px;
      font-size: 14px;
      vertical-align: middle;
    }

    .item-img {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--card);
    }

    .img-placeholder {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .qty-badge {
      background: rgba(79,142,247,.15);
      color: var(--accent);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .price-tag { font-weight: 600; color: var(--success); }

    .note-text { color: var(--muted); font-size: 13px; max-width: 180px; truncate: clip; }

    .btn-delete {
      background: rgba(247,86,106,.1);
      border: 1px solid rgba(247,86,106,.25);
      border-radius: 7px;
      color: var(--danger);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-delete:hover { background: rgba(247,86,106,.22); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .big { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 30px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      position: relative;
      animation: slideUp .22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

    .modal .field label { font-size: 13px; color: var(--muted); font-weight: 500; margin-bottom: 6px; display: block; }

    .modal .field input,
    .modal .field textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      font-family: var(--font);
    }

    .modal .field input:focus,
    .modal .field textarea:focus { border-color: var(--accent); }

    .modal .field textarea { resize: vertical; min-height: 80px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-submit {
      flex: 2;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      padding: 12px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }

    .btn-submit:hover { opacity: .88; }

    /* image upload */
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      margin-bottom: 6px;
    }

    .img-upload-area:hover { border-color: var(--accent); }
    .img-upload-area .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .img-upload-area p { font-size: 13px; color: var(--muted); }
    .img-upload-area input[type="file"] { display: none; }

    .img-preview {
      display: none;
      position: relative;
      margin-bottom: 6px;
    }

    .img-preview img {
      width: 100%; max-height: 160px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .img-preview .remove-img {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.7);
      border: none; border-radius: 50%;
      width: 26px; height: 26px;
      color: #fff; cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    /* loading */
    .loading-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 18px;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 999;
      display: flex; align-items: center; gap: 8px;
      transform: translateY(20px); opacity: 0;
      transition: all .25s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* GAS url banner */
    .gas-banner {
      background: rgba(79,142,247,.1);
      border: 1px solid rgba(79,142,247,.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 640px) {
      main { padding: 16px; }
      .stats { grid-template-columns: 1fr 1fr; }
      header { padding: 0 16px; }
      .modal { margin: 16px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">📦</div>
      <h1>庫存管理系統</h1>
      <p>請輸入密碼以繼續</p>
    </div>
    <div class="error-msg" id="login-error">密碼錯誤，請再試一次</div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwd-input" placeholder="輸入密碼…" />
    </div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">📦</div>
      <h2>庫存管理</h2>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </header>

  <main>
    <!-- GAS url hint -->
    <div class="gas-banner" id="gas-banner">
      ⚙️ 請在 <code>config.js</code> 或下方設定 Apps Script URL，才能正常讀寫資料。
      <button onclick="promptGasUrl()" style="margin-left:auto;background:var(--accent);border:none;border-radius:6px;color:#fff;padding:5px 12px;font-size:12px;cursor:pointer;">設定</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜尋名稱…" oninput="filterItems()" />
      </div>
      <button class="btn-add" onclick="openModal()">＋ 新增品項</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="label">品項總數</div>
        <div class="value blue" id="stat-count">—</div>
      </div>
      <div class="stat-card">
        <div class="label">總庫存數量</div>
        <div class="value purple" id="stat-qty">—</div>
      </div>
      <div class="stat-card">
        <div class="label">庫存總價值</div>
        <div class="value green" id="stat-value">—</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>圖片</th>
            <th>名稱</th>
            <th>數量</th>
            <th>價格</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="item-tbody">
          <tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ═══════════════ MODAL ═══════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>新增品項</h3>

    <!-- Image Upload -->
    <div class="field">
      <label>圖片（選填）</label>
      <div class="img-preview" id="img-preview">
        <img id="preview-img" src="" alt="預覽"/>
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
      <div class="img-upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(event)" />
        <div class="upload-icon">🖼️</div>
        <p>點擊上傳圖片</p>
        <p style="margin-top:4px;font-size:11px;">支援 JPG、PNG、GIF（最大 2MB）</p>
      </div>
    </div>

    <div class="field">
      <label>名稱 *</label>
      <input type="text" id="f-name" placeholder="品項名稱" />
    </div>
    <div class="field">
      <label>數量 *</label>
      <input type="number" id="f-qty" placeholder="0" min="0" />
    </div>
    <div class="field">
      <label>價格</label>
      <input type="number" id="f-price" placeholder="0" min="0" step="0.01" />
    </div>
    <div class="field">
      <label>備註</label>
      <textarea id="f-note" placeholder="備註說明…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitItem()">新增品項</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
//  CONFIG — 填入你的 Apps Script Web App URL
// ════════════════════════════════════════
let GAS_URL = localStorage.getItem('gas_url') || 'https://script.google.com/macros/s/AKfycbw1v5zjZIp9PdnNT8DMBO7-NFERwyirt86yA7J8BEtf9yhMeShtR3J16CE6F9KHZSOvUQ/exec';

const PASSWORD = 'admin1234'; // 預設密碼

// ════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('login-error').style.display = 'none';
    if (GAS_URL) {
      document.getElementById('gas-banner').style.display = 'none';
      loadItems();
    }
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

// ════════════════════════════════════════
//  GAS URL
// ════════════════════════════════════════
function promptGasUrl() {
  const url = prompt('請輸入 Google Apps Script Web App URL：', GAS_URL);
  if (url && url.trim()) {
    GAS_URL = url.trim();
    localStorage.setItem('gas_url', GAS_URL);
    document.getElementById('gas-banner').style.display = 'none';
    loadItems();
  }
}

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let allItems = [];
let imageBase64 = null;

// ════════════════════════════════════════
//  LOAD ITEMS
// ════════════════════════════════════════
async function loadItems() {
  if (!GAS_URL) return;
  setTableLoading(true);
  try {
    const res = await fetch(`${GAS_URL}?action=getAll`);
    const data = await res.json();
    allItems = data.items || [];
    renderTable(allItems);
    updateStats(allItems);
  } catch (e) {
    showToast('讀取失敗：' + e.message, 'error');
    setTableLoading(false);
  }
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function renderTable(items) {
  const tbody = document.getElementById('item-tbody');
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <div class="big">📭</div>
        <p>目前沒有品項，點擊「新增品項」開始吧！</p>
      </div>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(item => `
    <tr>
      <td>
        ${item.imageUrl
          ? `<img class="item-img" src="${escHtml(item.imageUrl)}" alt="${escHtml(item.name)}" />`
          : `<div class="img-placeholder">📦</div>`}
      </td>
      <td><strong>${escHtml(item.name)}</strong></td>
      <td><span class="qty-badge">${escHtml(String(item.qty))}</span></td>
      <td><span class="price-tag">$${Number(item.price||0).toLocaleString()}</span></td>
      <td><span class="note-text">${escHtml(item.note || '—')}</span></td>
      <td>
        <button class="btn-delete" onclick="deleteItem('${escHtml(item.id)}', '${escHtml(item.name)}')">刪除</button>
      </td>
    </tr>
  `).join('');
}

function updateStats(items) {
  document.getElementById('stat-count').textContent = items.length;
  const totalQty = items.reduce((s, i) => s + Number(i.qty || 0), 0);
  const totalVal = items.reduce((s, i) => s + Number(i.qty || 0) * Number(i.price || 0), 0);
  document.getElementById('stat-qty').textContent = totalQty.toLocaleString();
  document.getElementById('stat-value').textContent = '$' + totalVal.toLocaleString();
}

function setTableLoading(on) {
  if (on) {
    document.getElementById('item-tbody').innerHTML =
      `<tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>`;
  }
}

// ════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════
function filterItems() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = q ? allItems.filter(i => i.name.toLowerCase().includes(q)) : allItems;
  renderTable(filtered);
  updateStats(filtered);
}

// ════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  resetForm();
}

function resetForm() {
  ['f-name','f-qty','f-price','f-note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  removeImage();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ════════════════════════════════════════
//  IMAGE
// ════════════════════════════════════════
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showToast('圖片大小不能超過 2MB', 'error'); return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result;
    document.getElementById('preview-img').src = imageBase64;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('file-input').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
}

// ════════════════════════════════════════
//  SUBMIT
// ════════════════════════════════════════
async function submitItem() {
  if (!GAS_URL) { showToast('請先設定 Apps Script URL', 'error'); return; }
  const name  = document.getElementById('f-name').value.trim();
  const qty   = document.getElementById('f-qty').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const note  = document.getElementById('f-note').value.trim();

  if (!name) { showToast('請輸入品項名稱', 'error'); return; }
  if (!qty && qty !== '0') { showToast('請輸入數量', 'error'); return; }

  const payload = { action: 'add', name, qty: Number(qty), price: Number(price)||0, note, imageBase64: imageBase64||'' };

  const btn = document.querySelector('.btn-submit');
  btn.textContent = '新增中…'; btn.disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      showToast('新增成功！', 'success');
      closeModal();
      loadItems();
    } else {
      showToast('新增失敗：' + (data.error||'未知錯誤'), 'error');
    }
  } catch(e) {
    showToast('新增失敗：' + e.message, 'error');
  } finally {
    btn.textContent = '新增品項'; btn.disabled = false;
  }
}

// ════════════════════════════════════════
//  DELETE
// ════════════════════════════════════════
async function deleteItem(id, name) {
  if (!confirm(`確定要刪除「${name}」嗎？`)) return;
  if (!GAS_URL) { showToast('請先設定 Apps Script URL', 'error'); return; }

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id })
    });
    const data = await res.json();
    if (data.success) {
      showToast('已刪除「' + name + '」', 'success');
      loadItems();
    } else {
      showToast('刪除失敗：' + (data.error||''), 'error');
    }
  } catch(e) {
    showToast('刪除失敗：' + e.message, 'error');
  }
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = 'toast ' + type;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
