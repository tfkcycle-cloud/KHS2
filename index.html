<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>庫存管理系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --card: #22263a; --border: #2e3352;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf6; --muted: #7b82a8;
      --danger: #f7566a; --success: #3dd68c; --warn: #f5a623;
      --price1: #4f8ef7; --price2: #a78bfa; --price3: #3dd68c; --price4: #f5a623;
      --font: 'Segoe UI', system-ui, sans-serif; --radius: 12px;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #1a1f3c 0%, var(--bg) 70%);
      padding: 16px;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px; display: inline-flex; align-items: center;
      justify-content: center; font-size: 24px; margin-bottom: 10px;
    }
    .login-logo h1 { font-size: 20px; font-weight: 700; }
    .login-logo p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field input, .field textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s; font-family: var(--font);
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 72px; }

    .btn-primary {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 13px; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .1s; margin-top: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }

    .error-msg {
      background: rgba(247,86,106,.12); border: 1px solid rgba(247,86,106,.35);
      color: var(--danger); border-radius: 8px; padding: 10px 13px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }

    #app { display: none; }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    header h2 { font-size: 15px; font-weight: 700; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .role-badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      background: var(--card);
    }

    .role-badge.admin {
      color: var(--success);
      border-color: rgba(61,214,140,.35);
      background: rgba(61,214,140,.1);
    }

    .role-badge.basic {
      color: var(--warn);
      border-color: rgba(245,166,35,.35);
      background: rgba(245,166,35,.1);
    }

    .logout-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 6px 12px; font-size: 13px; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    main { padding: 20px; max-width: 1100px; margin: 0 auto; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .search-wrap { flex: 1; min-width: 160px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 13px 10px 38px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 15px; pointer-events: none;
    }
    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 10px 18px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: opacity .2s; white-space: nowrap;
    }
    .btn-add:hover { opacity: .88; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card .value.blue   { color: var(--accent); }
    .stat-card .value.purple { color: var(--accent2); }
    .stat-card .value.green  { color: var(--success); }

    .price-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3px 8px; min-width: 130px;
    }
    .price-grid.basic-price {
      grid-template-columns: 1fr;
      min-width: 70px;
    }
    .price-item { display: flex; flex-direction: column; }
    .price-item .pl { font-size: 10px; color: var(--muted); line-height: 1; margin-bottom: 1px; }
    .price-item .pv { font-size: 13px; font-weight: 600; }
    .pv.c1 { color: var(--price1); }
    .pv.c2 { color: var(--price2); }
    .pv.c3 { color: var(--price3); }
    .pv.c4 { color: var(--price4); }

    .price-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .pbadge {
      display: flex; align-items: center; gap: 3px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px 7px; font-size: 12px;
    }
    .pbadge .pbl { font-size: 10px; color: var(--muted); }
    .pbadge .pbv { font-weight: 600; }

    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--card); padding: 12px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 12px 14px; font-size: 14px; vertical-align: middle; }

    .thumb-wrap { cursor: zoom-in; position: relative; display: inline-block; }
    .thumb-wrap:hover .zoom-hint { opacity: 1; }
    .zoom-hint {
      position: absolute; inset: 0; border-radius: 8px;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; opacity: 0; transition: opacity .18s; pointer-events: none;
    }
    .item-img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; display: block; }
    .img-placeholder {
      width: 42px; height: 42px; border-radius: 8px; background: var(--card);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }

    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: min(90vw, 860px); max-height: 86vh;
      border-radius: 12px; object-fit: contain;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      animation: lbIn .2s ease;
      cursor: default;
    }
    @keyframes lbIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
    #lightbox-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(255,255,255,.12); border: none; border-radius: 50%;
      width: 38px; height: 38px; color: #fff; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .18s; z-index: 501;
    }
    #lightbox-close:hover { background: rgba(255,255,255,.25); }

    .qty-badge {
      background: rgba(79,142,247,.15); color: var(--accent);
      border-radius: 6px; padding: 2px 9px; font-size: 13px; font-weight: 600;
    }
    .note-text { color: var(--muted); font-size: 13px; }

    .actions { display: flex; gap: 6px; }
    .btn-edit {
      background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3);
      border-radius: 7px; color: var(--accent); padding: 5px 10px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-edit:hover { background: rgba(79,142,247,.25); }
    .btn-delete {
      background: rgba(247,86,106,.1); border: 1px solid rgba(247,86,106,.25);
      border-radius: 7px; color: var(--danger); padding: 5px 10px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-delete:hover { background: rgba(247,86,106,.22); }
    .restricted-text {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .card-list { display: none; flex-direction: column; gap: 10px; }
    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
    }
    .item-card-top { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .item-card-top .thumb-wrap,
    .item-card-top .img-placeholder { flex-shrink: 0; }
    .item-card-top .item-img { width: 54px; height: 54px; }
    .item-card-top .img-placeholder { width: 54px; height: 54px; font-size: 22px; }
    .item-card-top .zoom-hint { font-size: 18px; }
    .item-card-info { flex: 1; min-width: 0; }
    .item-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .item-card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .item-card-note { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .item-card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .item-card-actions .btn-edit,
    .item-card-actions .btn-delete { flex: 1; text-align: center; padding: 8px; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .big { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }
    .loading-row td { text-align: center; padding: 40px; color: var(--muted); }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 200;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 24px; width: 100%; max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6); max-height: 90vh; overflow-y: auto;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; background: transparent; border: 1px solid var(--border);
      border-radius: 10px; padding: 11px; color: var(--muted);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-submit {
      flex: 2; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 11px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .88; }

    .price-fields {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
    }
    .price-fields .field { margin-bottom: 0; }
    .price-fields .field label { font-size: 12px; }
    .price-fields .field label::before {
      content: ''; display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 5px; vertical-align: middle;
    }
    .price-fields .field:nth-child(1) label::before { background: var(--price1); }
    .price-fields .field:nth-child(2) label::before { background: var(--price2); }
    .price-fields .field:nth-child(3) label::before { background: var(--price3); }
    .price-fields .field:nth-child(4) label::before { background: var(--price4); }

    .basic-hide {
      display: none !important;
    }

    .img-upload-area {
      border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 4px;
    }
    .img-upload-area:hover { border-color: var(--accent); }
    .img-upload-area .upload-icon { font-size: 26px; margin-bottom: 6px; }
    .img-upload-area p { font-size: 13px; color: var(--muted); }
    .img-upload-area input[type="file"] { display: none; }
    .img-choice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-img-choice {
      background: var(--card); border: 1px solid var(--border); border-radius: 9px;
      color: var(--text); padding: 9px 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: border-color .2s, transform .1s;
    }
    .btn-img-choice:hover { border-color: var(--accent); }
    .btn-img-choice:active { transform: scale(.98); }
    .img-preview { display: none; position: relative; margin-bottom: 4px; }
    .img-preview img {
      width: 100%; max-height: 140px; object-fit: cover;
      border-radius: 10px; border: 1px solid var(--border);
    }
    .img-preview .remove-img {
      position: absolute; top: 7px; right: 7px; background: rgba(0,0,0,.7);
      border: none; border-radius: 50%; width: 24px; height: 24px;
      color: #fff; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-size-hint { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }

    .progress-msg {
      font-size: 13px; color: var(--muted); text-align: center;
      margin-top: 10px; min-height: 18px;
    }

    .toast {
      position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 340px; margin: 0 auto;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 999; display: flex; align-items: center; gap: 8px;
      transform: translateY(20px); opacity: 0; transition: all .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger);  }

    .gas-banner {
      background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.3);
      border-radius: 10px; padding: 11px 14px; font-size: 13px; color: var(--accent);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .gas-banner button {
      margin-left: auto; background: var(--accent); border: none; border-radius: 6px;
      color: #fff; padding: 5px 12px; font-size: 12px; cursor: pointer;
    }

    @media (max-width: 600px) {
      main { padding: 14px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stat-card:last-child { grid-column: span 2; }
      .table-wrap { display: none; }
      .card-list  { display: flex; }
      header { padding: 0 14px; }
      .role-badge { display: none; }
    }
    @media (min-width: 601px) {
      .toast { left: auto; max-width: 340px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">📦</div>
      <h1>庫存管理系統</h1>
      <p></p>
    </div>
    <div class="error-msg" id="login-error">密碼錯誤，請再試一次</div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwd-input" placeholder="輸入密碼…" />
    </div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">📦</div>
      <h2>庫存管理</h2>
    </div>
    <div class="header-right">
      <span class="role-badge" id="role-badge">未登入</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </header>

  <main>
    <div class="gas-banner" id="gas-banner">
      ⚙️ 尚未設定 Apps Script URL
      <button onclick="promptGasUrl()">設定</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜尋名稱…" oninput="filterItems()" />
      </div>
      <button class="btn-add" onclick="openModal()">＋ 新增</button>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="label">品項總數</div><div class="value blue" id="stat-count">—</div></div>
      <div class="stat-card"><div class="label">總數量</div><div class="value purple" id="stat-qty">—</div></div>
      <div class="stat-card"><div class="label">庫存售價值</div><div class="value green" id="stat-value">—</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>圖片</th><th>名稱</th><th>數量</th><th>價格</th><th>備註</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="item-tbody">
          <tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card-list" id="card-list"></div>
  </main>
</div>

<div id="lightbox" onclick="closeLightbox(event)">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="放大圖片" onclick="event.stopPropagation()" />
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">新增品項</h3>
    <input type="hidden" id="edit-id" />

    <div class="field">
      <label>圖片（選填）</label>
      <div class="img-preview" id="img-preview">
        <img id="preview-img" src="" alt="預覽"/>
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
      <div class="img-upload-area" id="upload-area">
        <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(event)" />
        <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleImageSelect(event)" />
        <div class="upload-icon">🖼️</div>
        <p>選擇圖片來源</p>
        <p style="margin-top:3px;font-size:11px;">JPG、PNG、GIF（自動壓縮至 25KB 以內）</p>
        <div class="img-choice-row">
          <button type="button" class="btn-img-choice" onclick="document.getElementById('file-input').click()">相簿選擇</button>
          <button type="button" class="btn-img-choice" onclick="document.getElementById('camera-input').click()">現場拍照</button>
        </div>
      </div>
      <div class="img-size-hint" id="img-size-hint"></div>
    </div>

    <div class="field"><label>名稱 *</label><input type="text" id="f-name" placeholder="品項名稱" /></div>
    <div class="field"><label>數量 *</label><input type="number" id="f-qty" placeholder="0" min="0" /></div>

    <div style="font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500;">價格設定</div>
    <div class="price-fields">
      <div class="field admin-only-price"><label>進價</label><input type="number" id="f-cost" placeholder="0" min="0" step="0.01" /></div>
      <div class="field admin-only-price"><label>批價</label><input type="number" id="f-wholesale" placeholder="0" min="0" step="0.01" /></div>
      <div class="field"><label>售價</label><input type="number" id="f-retail" placeholder="0" min="0" step="0.01" /></div>
      <div class="field"><label>優惠價</label><input type="number" id="f-promo" placeholder="0" min="0" step="0.01" /></div>
    </div>

    <div class="field"><label>備註</label><textarea id="f-note" placeholder="備註說明…"></textarea></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="modal-submit-btn" onclick="submitItem()">新增品項</button>
    </div>
    <div class="progress-msg" id="progress-msg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let GAS_URL = localStorage.getItem('gas_url') || 'https://script.google.com/macros/s/AKfycby_riSaM2mhIi6MMh_VE8124hs_tao0scG-tPsAd81oW-MgdlXCsFolq-gjUDvWt_GM-A/exec';

let AUTH_TOKEN = sessionStorage.getItem('auth_token') || '';
let USER_ROLE = sessionStorage.getItem('user_role') || '';

let allItems = [];
let imageBase64 = null;
let imageMode = 'none'; // none / keep / new / remove
let editingId = null;

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function isAdmin() {
  return USER_ROLE === 'admin';
}

function isBasic() {
  return USER_ROLE === 'basic';
}

function updateRoleBadge() {
  const badge = document.getElementById('role-badge');
  badge.classList.remove('admin', 'basic');

  if (isAdmin()) {
    badge.textContent = '高級模式';
    badge.classList.add('admin');
  } else if (isBasic()) {
    badge.textContent = '限制模式';
    badge.classList.add('basic');
  } else {
    badge.textContent = '未登入';
  }
}

function applyRoleUI() {
  updateRoleBadge();

  document.querySelectorAll('.admin-only-price').forEach(el => {
    el.classList.toggle('basic-hide', !isAdmin());
  });
}

// 統一處理 fetch 逾時：避免 Apps Script 卡住時，畫面一直停在「儲存中」。
// timeoutMs 預設 25 秒，超過就會主動中止請求。
async function fetchWithTimeout(url, options = {}, timeoutMs = 25000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  try {
    return await fetch(url, {
      ...options,
      signal: controller.signal
    });
  } finally {
    clearTimeout(timer);
  }
}

// Apps Script 有時候錯誤會回 HTML，不一定是 JSON。
// 所以先用 text() 接，再自己 JSON.parse，錯誤訊息會比較清楚。
async function parseJsonResponse(res) {
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (err) {
    console.error('非 JSON 回應內容：', text);
    throw new Error('伺服器回傳不是 JSON，請確認 Apps Script URL 是 /exec，且已重新部署最新版');
  }
}

// 統一把 fetch 錯誤轉成使用者看得懂的訊息。
function getFetchErrorMessage(e) {
  if (e.name === 'AbortError') {
    return '操作逾時：Apps Script 回應太慢，請重新整理確認資料是否已更新';
  }

  if (String(e.message).includes('Failed to fetch')) {
    return '連線失敗：可能是 Apps Script 暫時中斷、部署網址錯誤、網路不穩，或圖片資料太大';
  }

  return e.message || '未知錯誤';
}

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;

  if (!pwd) {
    showToast('請輸入密碼', 'error');
    return;
  }

  try {
    const params = new URLSearchParams({
      action: 'login',
      pwd
    });

    const res = await fetchWithTimeout(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });

    const data = await parseJsonResponse(res);

    if (data.success) {
      AUTH_TOKEN = data.token;
      USER_ROLE = data.role;

      sessionStorage.setItem('auth_token', AUTH_TOKEN);
      sessionStorage.setItem('user_role', USER_ROLE);

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      const errEl = document.getElementById('login-error');
      if (errEl) errEl.style.display = 'none';

      if (GAS_URL) {
        const banner = document.getElementById('gas-banner');
        if (banner) banner.style.display = 'none';
      }

      applyRoleUI();
      showToast(isAdmin() ? '已進入高級模式' : '已進入限制模式', 'success');
      loadItems();

    } else {
      const errEl = document.getElementById('login-error');
      if (errEl) errEl.style.display = 'block';

      document.getElementById('pwd-input').value = '';
      showToast('密碼錯誤', 'error');
    }

  } catch (err) {
    showToast(getFetchErrorMessage(err), 'error');
    console.error(err);
  }
}

function doLogout() {
  AUTH_TOKEN = '';
  USER_ROLE = '';

  sessionStorage.removeItem('auth_token');
  sessionStorage.removeItem('user_role');

  allItems = [];
  imageBase64 = null;
  imageMode = 'none';
  editingId = null;

  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd-input').value = '';

  updateRoleBadge();
}

function promptGasUrl() {
  const url = prompt('請輸入 Google Apps Script Web App URL：', GAS_URL);

  if (url && url.trim()) {
    GAS_URL = url.trim();
    localStorage.setItem('gas_url', GAS_URL);
    document.getElementById('gas-banner').style.display = 'none';

    if (AUTH_TOKEN) loadItems();
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openLightboxFromBase64(base64) {
  openLightbox('data:image/jpeg;base64,' + base64);
}

function closeLightbox(e) {
  if (e && e.target === document.getElementById('lightbox-img')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

function thumbHTML(imageData) {
  if (!imageData) return `<div class="img-placeholder">📦</div>`;

  const safeBase64 = esc(imageData);
  const src = `data:image/jpeg;base64,${safeBase64}`;

  return `<div class="thumb-wrap" onclick="openLightboxFromBase64('${safeBase64}')">
    <img class="item-img" src="${src}" />
    <div class="zoom-hint">🔍</div>
  </div>`;
}

function priceGridHTML(item) {
  const fmt = v => v ? '$' + Number(v).toLocaleString() : '<span style="color:var(--muted);font-size:11px;">—</span>';

  if (!isAdmin()) {
    return `<div class="price-grid">
      <div class="price-item"><span class="pl">售價</span><span class="pv c3">${fmt(item.retail)}</span></div>
      <div class="price-item"><span class="pl">優惠</span><span class="pv c4">${fmt(item.promo)}</span></div>
    </div>`;
  }

  return `<div class="price-grid">
    <div class="price-item"><span class="pl">進價</span><span class="pv c1">${fmt(item.cost)}</span></div>
    <div class="price-item"><span class="pl">批價</span><span class="pv c2">${fmt(item.wholesale)}</span></div>
    <div class="price-item"><span class="pl">售價</span><span class="pv c3">${fmt(item.retail)}</span></div>
    <div class="price-item"><span class="pl">優惠</span><span class="pv c4">${fmt(item.promo)}</span></div>
  </div>`;
}

function priceBadgesHTML(item) {
  const basicDefs = [
    { label: '售', key: 'retail', cls: 'c3' },
    { label: '惠', key: 'promo', cls: 'c4' }
  ];

  const adminDefs = [
    { label: '進', key: 'cost', cls: 'c1' },
    { label: '批', key: 'wholesale', cls: 'c2' },
    { label: '售', key: 'retail', cls: 'c3' },
    { label: '惠', key: 'promo', cls: 'c4' },
  ];

  const defs = isAdmin() ? adminDefs : basicDefs;

  return defs.filter(d => item[d.key]).map(d =>
    `<span class="pbadge">
       <span class="pbl">${d.label}</span>
       <span class="pbv ${d.cls}">$${Number(item[d.key]).toLocaleString()}</span>
     </span>`
  ).join('') || '<span style="color:var(--muted);font-size:12px;">未設定</span>';
}

const MAX_BYTES = 25 * 1024;
const BASE64_LIMIT = Math.ceil(MAX_BYTES * 4 / 3);

async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onerror = () => reject(new Error('讀取失敗'));

    reader.onload = ev => {
      const img = new Image();

      img.onerror = () => reject(new Error('圖片解碼失敗'));

      img.onload = () => {
        for (let maxDim of [400, 300, 200, 150]) {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const width = Math.round(img.width * scale);
          const height = Math.round(img.height * scale);

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;

          canvas.getContext('2d').drawImage(img, 0, 0, width, height);

          for (let q = 0.85; q >= 0.1; q -= 0.1) {
            const dataUrl = canvas.toDataURL('image/jpeg', q);
            const base64 = dataUrl.split(',')[1];

            if (base64.length <= BASE64_LIMIT) {
              resolve({
                dataUrl,
                base64,
                sizeKB: Math.round(base64.length * 3 / 4 / 1024)
              });
              return;
            }
          }
        }

        reject(new Error('圖片太複雜，無法壓縮至 25KB'));
      };

      img.src = ev.target.result;
    };

    reader.readAsDataURL(file);
  });
}

async function loadItems(showLoadingUI = true, showErrorToast = true) {
  if (!GAS_URL) return false;

  if (!AUTH_TOKEN) {
    if (showErrorToast) showToast('請先登入', 'error');
    return false;
  }

  if (showLoadingUI) setLoading(true);

  try {
    const res = await fetchWithTimeout(
      `${GAS_URL}?action=getAll&token=${encodeURIComponent(AUTH_TOKEN)}`,
      {},
      25000
    );

    const data = await parseJsonResponse(res);

    if (!data.success) {
      throw new Error(data.error || '讀取失敗');
    }

    if (data.role) {
      USER_ROLE = data.role;
      sessionStorage.setItem('user_role', USER_ROLE);
      applyRoleUI();
    }

    allItems = data.items || [];
    renderAll(allItems);
    return true;

  } catch (e) {
    const msg = getFetchErrorMessage(e);
    if (showErrorToast) showToast('讀取失敗：' + msg, 'error');

    if (String(msg).includes('未登入') || String(msg).includes('過期')) {
      doLogout();
    }

    return false;
  }
}

function setLoading(on) {
  if (!on) return;

  document.getElementById('item-tbody').innerHTML =
    `<tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>`;

  document.getElementById('card-list').innerHTML =
    '<div style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span>載入中…</div>';
}

function renderAll(items) {
  renderTable(items);
  renderCards(items);
  updateStats(items);
}

function actionHTML(item) {
  return `<div class="actions">
    <button class="btn-edit" onclick="openEdit('${esc(item.id)}')">編輯</button>
    <button class="btn-delete" onclick="deleteItem('${esc(item.id)}','${esc(item.name)}')">刪除</button>
  </div>`;
}

function cardActionHTML(item) {
  return `<div class="item-card-actions">
    <button class="btn-edit" onclick="openEdit('${esc(item.id)}')">✏️ 編輯</button>
    <button class="btn-delete" onclick="deleteItem('${esc(item.id)}','${esc(item.name)}')">🗑️ 刪除</button>
  </div>`;
}

function renderTable(items) {
  const tbody = document.getElementById('item-tbody');

  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="big">📭</div><p>目前沒有品項</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(item => `
    <tr>
      <td>${thumbHTML(item.imageData)}</td>
      <td><strong>${esc(item.name)}</strong></td>
      <td><span class="qty-badge">${esc(String(item.qty))}</span></td>
      <td>${priceGridHTML(item)}</td>
      <td><span class="note-text">${esc(item.note || '—')}</span></td>
      <td>${actionHTML(item)}</td>
    </tr>`).join('');
}

function renderCards(items) {
  const list = document.getElementById('card-list');

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">📭</div><p>目前沒有品項，點擊「新增」開始吧！</p></div>`;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="item-card">
      <div class="item-card-top">
        ${thumbHTML(item.imageData)}
        <div class="item-card-info">
          <div class="item-card-name">${esc(item.name)}</div>
          <div class="item-card-meta">
            <span class="qty-badge">${esc(String(item.qty))}</span>
          </div>
          <div class="price-badges">${priceBadgesHTML(item)}</div>
          ${item.note ? `<div class="item-card-note">${esc(item.note)}</div>` : ''}
        </div>
      </div>
      ${cardActionHTML(item)}
    </div>`).join('');
}

function updateStats(items) {
  document.getElementById('stat-count').textContent = items.length;

  document.getElementById('stat-qty').textContent =
    items.reduce((s, i) => s + Number(i.qty || 0), 0).toLocaleString();

  document.getElementById('stat-value').textContent =
    '$' + items.reduce((s, i) => s + Number(i.qty || 0) * Number(i.retail || 0), 0).toLocaleString();
}

function filterItems() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  renderAll(q ? allItems.filter(i => i.name.toLowerCase().includes(q)) : allItems);
}

function openModal() {
  editingId = null;
  imageMode = 'none';

  document.getElementById('modal-title').textContent = '新增品項';
  document.getElementById('modal-submit-btn').textContent = '新增品項';
  document.getElementById('edit-id').value = '';
  document.getElementById('progress-msg').textContent = '';

  resetForm();
  applyRoleUI();

  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function openEdit(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  editingId = id;

  document.getElementById('modal-title').textContent = '編輯品項';
  document.getElementById('modal-submit-btn').textContent = '儲存變更';
  document.getElementById('edit-id').value = id;

  document.getElementById('f-name').value = item.name;
  document.getElementById('f-qty').value = item.qty;
  document.getElementById('f-retail').value = item.retail || '';
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('progress-msg').textContent = '';
  document.getElementById('img-size-hint').textContent = '';

  document.getElementById('f-promo').value = item.promo || '';

  if (isAdmin()) {
    document.getElementById('f-cost').value = item.cost || '';
    document.getElementById('f-wholesale').value = item.wholesale || '';
  } else {
    document.getElementById('f-cost').value = '';
    document.getElementById('f-wholesale').value = '';
  }

  if (item.imageData) {
    imageMode = 'keep';
    imageBase64 = null;

    document.getElementById('preview-img').src = 'data:image/jpeg;base64,' + item.imageData;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
  } else {
    imageMode = 'none';
    imageBase64 = null;
    removeImage();
  }
  applyRoleUI();

  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
  imageMode = 'none';
  resetForm();
}

function resetForm() {
  ['f-name','f-qty','f-cost','f-wholesale','f-retail','f-promo','f-note']
    .forEach(id => document.getElementById(id).value = '');

  document.getElementById('img-size-hint').textContent = '';
  removeImage();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

async function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  setProgress('🗜️ 壓縮圖片中…');
  document.getElementById('img-size-hint').textContent = '';

  try {
    const result = await compressImage(file);

    imageBase64 = result.base64;
    imageMode = 'new';

    document.getElementById('preview-img').src = result.dataUrl;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('img-size-hint').textContent = `壓縮後約 ${result.sizeKB} KB`;

    setProgress('');

  } catch (err) {
    showToast(err.message, 'error');
    setProgress('');
  }
}

function removeImage() {
  imageBase64 = null;
  imageMode = editingId ? 'remove' : 'none';
  document.getElementById('file-input').value = '';
  const cameraInput = document.getElementById('camera-input');
  if (cameraInput) cameraInput.value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('img-size-hint').textContent = '';
}

function setProgress(msg) {
  document.getElementById('progress-msg').textContent = msg;
}

async function submitItem() {
  if (!GAS_URL) {
    showToast('請先設定 Apps Script URL', 'error');
    return;
  }

  if (!AUTH_TOKEN) {
    showToast('請先登入', 'error');
    return;
  }

  const isEdit = !!editingId;

  const name = document.getElementById('f-name').value.trim();
  const qty = document.getElementById('f-qty').value.trim();
  const cost = document.getElementById('f-cost').value.trim();
  const wholesale = document.getElementById('f-wholesale').value.trim();
  const retail = document.getElementById('f-retail').value.trim();
  const promo = document.getElementById('f-promo').value.trim();
  const note = document.getElementById('f-note').value.trim();

  if (!name) {
    showToast('請輸入品項名稱', 'error');
    return;
  }

  if (qty === '') {
    showToast('請輸入數量', 'error');
    return;
  }

  const btn = document.getElementById('modal-submit-btn');

  btn.disabled = true;
  setProgress('💾 儲存中…');
  btn.textContent = isEdit ? '儲存中…' : '新增中…';

  try {
    let imageParam = '';

    if (isEdit) {
      if (imageMode === 'new') {
        imageParam = imageBase64 || '';
      } else if (imageMode === 'remove') {
        imageParam = '';
      } else {
        imageParam = '__keep__';
      }
    } else {
      imageParam = imageBase64 || '';
    }

    const params = new URLSearchParams({
      token: AUTH_TOKEN,
      action: isEdit ? 'edit' : 'add',
      name,
      qty: Number(qty),
      cost: isAdmin() ? Number(cost) || 0 : 0,
      wholesale: isAdmin() ? Number(wholesale) || 0 : 0,
      retail: Number(retail) || 0,
      promo: Number(promo) || 0,
      note,
      image: imageParam
    });

    if (isEdit) params.set('id', editingId);

    const res = await fetchWithTimeout(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    }, 25000);

    const data = await parseJsonResponse(res);

    if (!data.success) {
      throw new Error(data.error || '伺服器回傳錯誤');
    }

    const savedId = isEdit ? editingId : (data.id || '');
    const oldItem = allItems.find(i => i.id === savedId) || {};

    const updatedItem = {
      ...oldItem,
      id: savedId,
      name,
      qty: Number(qty),
      retail: Number(retail) || 0,
      promo: Number(promo) || 0,
      note
    };

    if (isAdmin()) {
      updatedItem.cost = Number(cost) || 0;
      updatedItem.wholesale = Number(wholesale) || 0;
    }

    if (imageMode === 'new') {
      updatedItem.imageData = imageBase64 || '';
    } else if (imageMode === 'remove') {
      updatedItem.imageData = '';
    } else if (!isEdit) {
      updatedItem.imageData = imageBase64 || '';
    }

    if (isEdit) {
      allItems = allItems.map(item => item.id === savedId ? updatedItem : item);
    } else if (savedId) {
      allItems = [updatedItem, ...allItems];
    }

    renderAll(allItems);

    setProgress('');
    showToast(isEdit ? '已儲存變更！' : '新增成功！', 'success');
    closeModal();

    // 後端已成功後，再安靜同步一次。即使同步失敗，也不要蓋掉成功提示。
    await loadItems(false, false);

  } catch (e) {
    setProgress('');
    showToast('操作失敗：' + getFetchErrorMessage(e), 'error');
  } finally {
    btn.textContent = isEdit ? '儲存變更' : '新增品項';
    btn.disabled = false;
  }
}

async function deleteItem(id, name) {


  if (!AUTH_TOKEN) {
    showToast('請先登入', 'error');
    return;
  }

  if (!confirm(`確定要刪除「${name}」嗎？`)) return;

  try {
    const params = new URLSearchParams({
      token: AUTH_TOKEN,
      action: 'delete',
      id
    });

    const res = await fetchWithTimeout(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    }, 25000);

    const data = await parseJsonResponse(res);

    if (!data.success) {
      throw new Error(data.error || '刪除失敗');
    }

    showToast('已刪除「' + name + '」', 'success');
    loadItems();

  } catch (e) {
    showToast('刪除失敗：' + getFetchErrorMessage(e), 'error');
  }
}

let toastTimer;

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');

  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = 'toast ' + type;

  requestAnimationFrame(() => t.classList.add('show'));

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function boot() {
  applyRoleUI();

  if (AUTH_TOKEN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    if (GAS_URL) {
      const banner = document.getElementById('gas-banner');
      if (banner) banner.style.display = 'none';
    }

    loadItems();
  }
}

boot();
</script>
</body>
</html>
