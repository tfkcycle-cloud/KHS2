<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>庫存管理系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --card: #22263a; --border: #2e3352;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf6; --muted: #7b82a8;
      --danger: #f7566a; --success: #3dd68c; --warn: #f5a623;
      --font: 'Segoe UI', system-ui, sans-serif; --radius: 12px;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #1a1f3c 0%, var(--bg) 70%);
      padding: 16px;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px; display: inline-flex; align-items: center;
      justify-content: center; font-size: 24px; margin-bottom: 10px;
    }
    .login-logo h1 { font-size: 20px; font-weight: 700; }
    .login-logo p  { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field input, .field textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s; font-family: var(--font);
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 72px; }
    .btn-primary {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 13px; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .1s; margin-top: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }
    .error-msg {
      background: rgba(247,86,106,.12); border: 1px solid rgba(247,86,106,.35);
      color: var(--danger); border-radius: 8px; padding: 10px 13px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }

    /* APP */
    #app { display: none; }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    header h2 { font-size: 15px; font-weight: 700; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 6px 12px; font-size: 13px; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    main { padding: 20px; max-width: 1000px; margin: 0 auto; }

    /* TOOLBAR */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .search-wrap { flex: 1; min-width: 160px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 13px 10px 38px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 15px; pointer-events: none;
    }
    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 10px 18px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: opacity .2s; white-space: nowrap;
    }
    .btn-add:hover { opacity: .88; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card .value.blue   { color: var(--accent); }
    .stat-card .value.purple { color: var(--accent2); }
    .stat-card .value.green  { color: var(--success); }

    /* TABLE — desktop */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--card); padding: 12px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 12px 14px; font-size: 14px; vertical-align: middle; }
    .item-img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; }
    .img-placeholder {
      width: 42px; height: 42px; border-radius: 8px; background: var(--card);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .qty-badge {
      background: rgba(79,142,247,.15); color: var(--accent);
      border-radius: 6px; padding: 2px 9px; font-size: 13px; font-weight: 600;
    }
    .price-tag { font-weight: 600; color: var(--success); }
    .note-text { color: var(--muted); font-size: 13px; }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 6px; }
    .btn-edit {
      background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3);
      border-radius: 7px; color: var(--accent); padding: 5px 10px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-edit:hover { background: rgba(79,142,247,.25); }
    .btn-delete {
      background: rgba(247,86,106,.1); border: 1px solid rgba(247,86,106,.25);
      border-radius: 7px; color: var(--danger); padding: 5px 10px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-delete:hover { background: rgba(247,86,106,.22); }

    /* CARD VIEW — mobile */
    .card-list { display: none; flex-direction: column; gap: 10px; }
    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
    }
    .item-card-top { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .item-card-top .item-img, .item-card-top .img-placeholder { flex-shrink: 0; }
    .item-card-info { flex: 1; min-width: 0; }
    .item-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .item-card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .item-card-note { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .item-card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .item-card-actions .btn-edit,
    .item-card-actions .btn-delete { flex: 1; text-align: center; padding: 8px; }

    /* EMPTY / LOADING */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .big { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }
    .loading-row td { text-align: center; padding: 40px; color: var(--muted); }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 200;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 24px; width: 100%; max-width: 460px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6); max-height: 90vh; overflow-y: auto;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; background: transparent; border: 1px solid var(--border);
      border-radius: 10px; padding: 11px; color: var(--muted);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-submit {
      flex: 2; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; padding: 11px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .88; }

    /* IMAGE UPLOAD */
    .img-upload-area {
      border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 4px;
    }
    .img-upload-area:hover { border-color: var(--accent); }
    .img-upload-area .upload-icon { font-size: 26px; margin-bottom: 6px; }
    .img-upload-area p { font-size: 13px; color: var(--muted); }
    .img-upload-area input[type="file"] { display: none; }
    .img-preview { display: none; position: relative; margin-bottom: 4px; }
    .img-preview img {
      width: 100%; max-height: 140px; object-fit: cover;
      border-radius: 10px; border: 1px solid var(--border);
    }
    .img-preview .remove-img {
      position: absolute; top: 7px; right: 7px; background: rgba(0,0,0,.7);
      border: none; border-radius: 50%; width: 24px; height: 24px;
      color: #fff; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 340px; margin: 0 auto;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 999; display: flex; align-items: center; gap: 8px;
      transform: translateY(20px); opacity: 0; transition: all .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger);  }

    /* GAS BANNER */
    .gas-banner {
      background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.3);
      border-radius: 10px; padding: 11px 14px; font-size: 13px; color: var(--accent);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .gas-banner button {
      margin-left: auto; background: var(--accent); border: none; border-radius: 6px;
      color: #fff; padding: 5px 12px; font-size: 12px; cursor: pointer;
    }

    /* RWD */
    @media (max-width: 600px) {
      main { padding: 14px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stat-card:last-child { grid-column: span 2; }
      .table-wrap { display: none; }
      .card-list  { display: flex; }
      header { padding: 0 14px; }
    }
    @media (min-width: 601px) {
      .toast { left: auto; max-width: 340px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">📦</div>
      <h1>庫存管理系統</h1>
      <p>請輸入密碼以繼續</p>
    </div>
    <div class="error-msg" id="login-error">密碼錯誤，請再試一次</div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwd-input" placeholder="輸入密碼…" />
    </div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">📦</div>
      <h2>庫存管理</h2>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </header>
  <main>
    <div class="gas-banner" id="gas-banner">
      ⚙️ 尚未設定 Apps Script URL
      <button onclick="promptGasUrl()">設定</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜尋名稱…" oninput="filterItems()" />
      </div>
      <button class="btn-add" onclick="openModal()">＋ 新增</button>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="label">品項總數</div><div class="value blue" id="stat-count">—</div></div>
      <div class="stat-card"><div class="label">總數量</div><div class="value purple" id="stat-qty">—</div></div>
      <div class="stat-card"><div class="label">總價值</div><div class="value green" id="stat-value">—</div></div>
    </div>

    <!-- Desktop table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>圖片</th><th>名稱</th><th>數量</th><th>價格</th><th>備註</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="item-tbody">
          <tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="card-list" id="card-list"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">新增品項</h3>
    <input type="hidden" id="edit-id" />

    <div class="field">
      <label>圖片（選填）</label>
      <div class="img-preview" id="img-preview">
        <img id="preview-img" src="" alt="預覽"/>
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
      <div class="img-upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(event)" />
        <div class="upload-icon">🖼️</div>
        <p>點擊上傳圖片</p>
        <p style="margin-top:3px;font-size:11px;">JPG、PNG、GIF（最大 2MB）</p>
      </div>
    </div>
    <div class="field"><label>名稱 *</label><input type="text" id="f-name" placeholder="品項名稱" /></div>
    <div class="field"><label>數量 *</label><input type="number" id="f-qty" placeholder="0" min="0" /></div>
    <div class="field"><label>價格</label><input type="number" id="f-price" placeholder="0" min="0" step="0.01" /></div>
    <div class="field"><label>備註</label><textarea id="f-note" placeholder="備註說明…"></textarea></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="modal-submit-btn" onclick="submitItem()">新增品項</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let GAS_URL = localStorage.getItem('gas_url') || 'https://script.google.com/macros/s/AKfycby0RAZcAhMQtCNZCxHFF_HvU-A3AtYnK6eoQjKOBITO4aGfxkwFvFJ0jfZV2H2LCeTsgw/exec';
const PASSWORD = 'admin1234';

/* =========================
   🧠 安全工具（新增）
========================= */
async function safeFetchJSON(url, options = {}) {
  try {
    const res = await fetch(url, options);

    if (!res.ok) {
      throw new Error(`HTTP錯誤：${res.status}`);
    }

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (e) {
      console.error("❌ JSON解析失敗，原始回傳：", text);
      throw new Error("API沒有回傳JSON");
    }

  } catch (err) {
    console.error("❌ fetch失敗：", err);
    throw err;
  }
}

// ── LOGIN ──
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  if (document.getElementById('pwd-input').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('login-error').style.display = 'none';

    if (GAS_URL) {
      document.getElementById('gas-banner').style.display = 'none';
      loadItems();
    }
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

// ── GAS URL ──
function promptGasUrl() {
  const url = prompt('請輸入 Google Apps Script Web App URL：', GAS_URL);
  if (url && url.trim()) {
    GAS_URL = url.trim();
    localStorage.setItem('gas_url', GAS_URL);
    document.getElementById('gas-banner').style.display = 'none';
    loadItems();
  }
}

// ── STATE ──
let allItems = [];
let imageBase64 = null;
let editingId = null;

// ── LOAD（已強化） ──
async function loadItems() {
  if (!GAS_URL) return;
  setLoading(true);

  try {
    const data = await safeFetchJSON(`${GAS_URL}?action=getAll`);

    allItems = data.items || [];
    renderAll(allItems);

  } catch (e) {
    showToast('讀取失敗：' + e.message, 'error');
  }
}

function setLoading(on) {
  if (on) {
    document.getElementById('item-tbody').innerHTML =
      `<tr class="loading-row"><td colspan="6"><span class="spinner"></span>載入中…</td></tr>`;
    document.getElementById('card-list').innerHTML =
      `<div style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span>載入中…</div>`;
  }
}

// ── RENDER ──
function renderAll(items) {
  renderTable(items);
  renderCards(items);
  updateStats(items);
}

/* =========================
   MODAL
========================= */

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新增品項';
  document.getElementById('modal-submit-btn').textContent = '新增品項';
  document.getElementById('edit-id').value = '';
  resetForm();
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  editingId = id;

  document.getElementById('modal-title').textContent = '編輯品項';
  document.getElementById('modal-submit-btn').textContent = '儲存變更';

  document.getElementById('f-name').value = item.name || '';
  document.getElementById('f-qty').value = item.qty || 0;
  document.getElementById('f-price').value = item.price || 0;
  document.getElementById('f-note').value = item.note || '';

  if (item.imageUrl) {
    document.getElementById('preview-img').src = item.imageUrl;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
  } else {
    removeImage();
  }

  imageBase64 = null;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  resetForm();
  editingId = null;
}

function resetForm() {
  ['f-name','f-qty','f-price','f-note'].forEach(id =>
    document.getElementById(id).value = ''
  );
  removeImage();
}

// ── IMAGE（加強安全） ──
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    showToast('圖片不能超過 2MB', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result || null;

    document.getElementById('preview-img').src = imageBase64;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
  };

  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('file-input').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
}

// ── SUBMIT（重大修正） ──
async function submitItem() {
  if (!GAS_URL) return showToast('請先設定 URL', 'error');

  const name = document.getElementById('f-name').value.trim();
  const qty = document.getElementById('f-qty').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const note = document.getElementById('f-note').value.trim();

  if (!name) return showToast('請輸入名稱', 'error');
  if (qty === '') return showToast('請輸入數量', 'error');

  const isEdit = !!editingId;

  const payload = {
    action: isEdit ? 'edit' : 'add',
    id: editingId,
    name,
    qty: Number(qty),
    price: Number(price) || 0,
    note,
    image: imageBase64 ? imageBase64.split(',')[1] : ''
  };

  const btn = document.getElementById('modal-submit-btn');
  btn.disabled = true;
  btn.textContent = isEdit ? '儲存中…' : '新增中…';

  try {
    await safeFetchJSON(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    showToast(isEdit ? '已更新！' : '新增成功！', 'success');
    closeModal();
    loadItems();

  } catch (e) {
    showToast('操作失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = isEdit ? '儲存變更' : '新增品項';
  }
}

// ── DELETE（修正） ──
async function deleteItem(id, name) {
  if (!confirm(`確定刪除「${name}」？`)) return;

  try {
    await safeFetchJSON(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'delete',
        id
      })
    });

    showToast(`已刪除 ${name}`, 'success');
    loadItems();

  } catch (e) {
    showToast('刪除失敗：' + e.message, 'error');
  }
}

// ── TOAST ──
let toastTimer;

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = 'toast ' + type;

  requestAnimationFrame(() => t.classList.add('show'));

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── UTIL ──
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
